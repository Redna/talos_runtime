<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Runtime — Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
            background: #0d1117;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #30363d;
        }
        h1 {
            font-size: 2.5rem;
            color: #58a6ff;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #8b949e;
            font-size: 1.1rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1.5rem;
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }
        .card h2 {
            color: #58a6ff;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .card p {
            color: #c9d1d9;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .card-link {
            display: inline-block;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .card-link:hover {
            text-decoration: underline;
        }
        .card-link::after {
            content: " →";
        }
        .status {
            margin-top: 3rem;
            text-align: center;
            color: #8b949e;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Talos Runtime</h1>
            <p class="subtitle">Autonomous Agent Architecture Specification</p>
        </header>

        <div class="card-grid">
            <div class="card">
                <h2>Architecture</h2>
                <p>Core design principles, layered architecture, Singular Stream model, task management, and self-modification cycle.</p>
                <a href="ARCHITECTURE.html" class="card-link">Read the specification</a>
            </div>
        </div>

        <div class="status">
            v5.1 — Last updated: April 2026
        </div>
    </div>
</body>
</html>
