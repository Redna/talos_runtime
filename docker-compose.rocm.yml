services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp
    restart: unless-stopped
    privileged: true
    shm_size: 16G
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - "8000:8080"
    environment:
      - HSA_ENABLE_SDMA=0
    command:
      - -m
      - /models/${DEFAULT_MODEL}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - -ngl
      - "999"
      - -c
      - "65536"
      - --no-warmup
      - --flash-attn
      - "on"
      - --cache-type-k
      - "q4_0"
      - --cache-type-v
      - "q4_0"
      - -b
      - "1024"
      - -ub
      - "512"
      - -np
      - "1"
      - --temp
      - "1.0"
      - --top-p
      - "0.95"
      - --top-k
      - "64"
      - --reasoning
      - "on"
    networks:
      - talos_net

networks:
  talos_net:
    driver: bridge