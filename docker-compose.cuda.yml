services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp
    restart: unless-stopped
    shm_size: 16G
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - "8000:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    command:
      - -m
      - /models/${DEFAULT_MODEL}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - -ngl
      - "99"
      - -c
      - "71680"
      - --no-warmup
      - --flash-attn
      - "on"
      - --cache-type-k
      - "q8_0"
      - --cache-type-v
      - "q8_0"
      - -b
      - "1024"
      - -ub
      - "1024"
      - -np
      - "1"
      - --temp
      - "1.0"
      - --top-p
      - "0.95"
      - --top-k
      - "64"
      - --chat-template-kwargs
      - '{"enable_thinking":true}'
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -X POST http://localhost:8080/v1/chat/completions -H 'Content-Type: application/json' -d '{\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":1}' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - talos_net

networks:
  talos_net:
    driver: bridge